name: Build and Release

on:
  push:
    branches:
      - dev
      - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to get full commit history for changelog

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Read FIRMWARE_VERSION from include/config.h ──────────────────────────
      - name: Extract firmware version from config.h
        id: version
        run: |
          VER=$(grep -oP '(?<=#define FIRMWARE_VERSION ")([^"]+)' include/config.h)
          echo "Detected version: $VER"
          echo "value=$VER" >> $GITHUB_OUTPUT

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # ─── Build env:esp32, esp32s3 ───────────────────────────────────────────
      - name: Build [esp32, esp32s3]
        run: pio run

      # ─── Rename & collect all flash binaries ──────────────────────────────────
      - name: Rename and collect firmware binaries
        run: |
          # ── ESP32 ──
          mv .pio/build/esp32/firmware.bin              firmware_esp32.bin
          mv .pio/build/esp32/bootloader.bin            bootloader_esp32.bin
          mv .pio/build/esp32/partitions.bin            partitions_esp32.bin
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
             boot_app0_esp32.bin

          # ── ESP32-S3 ──
          mv .pio/build/esp32s3/firmware.bin            firmware_esp32s3.bin
          mv .pio/build/esp32s3/bootloader.bin          bootloader_esp32s3.bin
          mv .pio/build/esp32s3/partitions.bin          partitions_esp32s3.bin
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
             boot_app0_esp32s3.bin

      # ─── Generate flash_args for esptool (one per variant) ───────────────────
      - name: Generate flash_args files
        run: |
          # ESP32  — bootloader at 0x1000
          cat > flash_args_esp32.txt << 'EOF'
          --chip esp32 --baud 460800 write_flash --flash_mode dio --flash_freq 40m --flash_size detect
          0x1000   bootloader_esp32.bin
          0x8000   partitions_esp32.bin
          0xe000   boot_app0_esp32.bin
          0x10000  firmware_esp32.bin
          EOF

          # ESP32-S3 — bootloader at 0x0000
          cat > flash_args_esp32s3.txt << 'EOF'
          --chip esp32s3 --baud 460800 write_flash --flash_mode dio --flash_freq 80m --flash_size detect
          0x0000   bootloader_esp32s3.bin
          0x8000   partitions_esp32s3.bin
          0xe000   boot_app0_esp32s3.bin
          0x10000  firmware_esp32s3.bin
          EOF

      # ─── Upload artifacts (both branches) ────────────────────────────────────
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware_esp32.bin
            bootloader_esp32.bin
            partitions_esp32.bin
            boot_app0_esp32.bin
            flash_args_esp32.txt
            firmware_esp32s3.bin
            bootloader_esp32s3.bin
            partitions_esp32s3.bin
            boot_app0_esp32s3.bin
            flash_args_esp32s3.txt

      # ─── Pre-release on dev push ──────────────────────────────────────────────
      - name: Create Pre-Release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.value }}-pre+${{ github.run_number }}"
          name: "Pre-Release v${{ steps.version.outputs.value }} (build ${{ github.run_number }})"
          prerelease: true
          draft: false
          body: |
            > ⚠️ This is an **automated pre-release** built from the latest commit on the `dev` branch.

            **Firmware Version:** `v${{ steps.version.outputs.value }}`
            **Commit:** `${{ github.sha }}`
            **Author:** ${{ github.actor }}
            **Message:** ${{ github.event.head_commit.message }}

            ---

            ## 📦 Included Files

            | File | Description |
            |------|-------------|
            | `firmware_esp32.bin` | Application firmware — ESP32 |
            | `bootloader_esp32.bin` | Bootloader — ESP32 (flash @ `0x1000`) |
            | `partitions_esp32.bin` | Partition table — ESP32 (flash @ `0x8000`) |
            | `boot_app0_esp32.bin` | OTA data initial — ESP32 (flash @ `0xe000`) |
            | `flash_args_esp32.txt` | esptool arguments — ESP32 |
            | `firmware_esp32s3.bin` | Application firmware — ESP32-S3 |
            | `bootloader_esp32s3.bin` | Bootloader — ESP32-S3 (flash @ `0x0000`) |
            | `partitions_esp32s3.bin` | Partition table — ESP32-S3 (flash @ `0x8000`) |
            | `boot_app0_esp32s3.bin` | OTA data initial — ESP32-S3 (flash @ `0xe000`) |
            | `flash_args_esp32s3.txt` | esptool arguments — ESP32-S3 |

            > 💡 Xem hướng dẫn flash tại [Getting Started](./getting-started.md)
          files: |
            firmware_esp32.bin
            bootloader_esp32.bin
            partitions_esp32.bin
            boot_app0_esp32.bin
            flash_args_esp32.txt
            firmware_esp32s3.bin
            bootloader_esp32s3.bin
            partitions_esp32s3.bin
            boot_app0_esp32s3.bin
            flash_args_esp32s3.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Release on release branch ────────────────────────────────────────────
      - name: Generate changelog from dev commits
        if: github.ref == 'refs/heads/release'
        id: changelog
        run: |
          # Get the last stable release tag (or fall back to first commit)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Changelog since: $LAST_TAG"

          # All commits on dev since last release (exclude merge commits)
          CHANGELOG=$(git log origin/dev --pretty=format:"- %s (%h)" --no-merges "${LAST_TAG}..HEAD" 2>/dev/null || \
                      git log origin/dev --pretty=format:"- %s (%h)" --no-merges)

          [ -z "$CHANGELOG" ] && CHANGELOG="- No individual commits listed."

          {
            echo "notes<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Included Files"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`firmware_esp32.bin\` | Application firmware — ESP32 |"
            echo "| \`bootloader_esp32.bin\` | Bootloader — ESP32 (flash @ \`0x1000\`) |"
            echo "| \`partitions_esp32.bin\` | Partition table — ESP32 (flash @ \`0x8000\`) |"
            echo "| \`boot_app0_esp32.bin\` | OTA data initial — ESP32 (flash @ \`0xe000\`) |"
            echo "| \`flash_args_esp32.txt\` | esptool arguments — ESP32 |"
            echo "| \`firmware_esp32s3.bin\` | Application firmware — ESP32-S3 |"
            echo "| \`bootloader_esp32s3.bin\` | Bootloader — ESP32-S3 (flash @ \`0x0000\`) |"
            echo "| \`partitions_esp32s3.bin\` | Partition table — ESP32-S3 (flash @ \`0x8000\`) |"
            echo "| \`boot_app0_esp32s3.bin\` | OTA data initial — ESP32-S3 (flash @ \`0xe000\`) |"
            echo "| \`flash_args_esp32s3.txt\` | esptool arguments — ESP32-S3 |"
            echo ""
            echo "> 💡 Xem hướng dẫn flash tại [Getting Started](./getting-started.md)"
            echo ""
            echo "---"
            echo "_Built from \`dev\` merged into \`release\` — commit \`${{ github.sha }}\`_"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.value }}"
          name: "Release v${{ steps.version.outputs.value }}"
          prerelease: false
          draft: false
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            firmware_esp32.bin
            bootloader_esp32.bin
            partitions_esp32.bin
            boot_app0_esp32.bin
            flash_args_esp32.txt
            firmware_esp32s3.bin
            bootloader_esp32s3.bin
            partitions_esp32s3.bin
            boot_app0_esp32s3.bin
            flash_args_esp32s3.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}