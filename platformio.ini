; ESP32 DSP Core — PlatformIO Configuration
; Real-time audio DSP framework inspired by MVSilicon BP10xx

[platformio]
default_envs = 
           ;esp32s3
           ;esp32

[env]
platform = https://github.com/pioarduino/platform-espressif32
framework = arduino
extra_scripts = pre:scripts/build_webui.py

; CPU at max clock for real-time audio
board_build.f_cpu = 240000000L

; Monitor
monitor_speed = 115200

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -O3
    -funroll-loops
    -fstrict-aliasing
    -Wall
    -Wno-unused-variable
    -Wno-unused-function
    -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN=1
    -DCONFIG_ADC_SUPPRESS_DEPRECATE_WARN=1
    -DCONFIG_DAC_SUPPRESS_DEPRECATE_WARN=1
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DWS_MAX_QUEUED_MESSAGES=512
    -DWIFI_AP_SSID=\"ESP32-DSP\"
    -DWIFI_AP_PASS=\"dsp12345\"

; Web server libraries
lib_deps = 
    mathieucarbou/ESPAsyncWebServer @ ^3.3.6
    mathieucarbou/AsyncTCP @ ^3.2.14
    bblanchon/ArduinoJson @ ^7.0.4

    
[env:esp32s3]
board = esp32-s3-devkitc1-n16r8

[env:esp32]
board = esp32dev