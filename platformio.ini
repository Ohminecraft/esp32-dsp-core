; ESP32 DSP Core — PlatformIO Configuration
; Real-time audio DSP framework inspired by MVSilicon BP10xx

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32
board = esp32-s3-devkitc1-n16r8
framework = arduino

; CPU at max clock for real-time audio
board_build.f_cpu = 240000000L

; Monitor
monitor_speed = 115200

; Build optimization
;
; DEBUG LEVELS (CORE_DEBUG_LEVEL):
;   0 = NONE   (no debug output, smallest binary)
;   1 = ERROR  (errors only)
;   2 = WARN   (warnings + errors)
;   3 = INFO   (general info logs)
;   4 = DEBUG  (detailed debug info)
;   5 = VERBOSE (very detailed, for DSP module development)
;
; Change -DCORE_DEBUG_LEVEL=0 to desired level (0-5)
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -O3
    -funroll-loops
    -fstrict-aliasing
    -Wall
    -Wno-unused-variable
    -Wno-unused-function
    -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN=1
    -DCONFIG_ADC_SUPPRESS_DEPRECATE_WARN=1
    -DCONFIG_DAC_SUPPRESS_DEPRECATE_WARN=1

; Partition scheme — default (no OTA needed)
board_build.partitions = default.csv
