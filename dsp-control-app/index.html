<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSP Control — ESP32 DSP Core</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══ Scanning Overlay (auto-connect) ═══ -->
<div id="scan-overlay">
    <div class="scan-card">
        <!-- Auto-Scan View -->
        <div id="scan-auto-content">
            <div class="scan-spinner"></div>
            <div class="scan-title">ESP32 DSP Core</div>
            <div class="scan-subtitle">Searching for your hardware device via serial ports...</div>
            <div class="scan-status" id="scan-ports-list">Scanning...</div>
            <button class="btn btn-outline btn-sm" id="btn-lobby-manual" style="margin-top: 20px;">Manual Selection</button>
        </div>

        <!-- Manual Lobby View -->
        <div id="scan-manual-content" style="display:none">
            <div class="scan-title">Connection Lobby</div>
            <div class="scan-subtitle">Select a serial port to connect manually.</div>
            <div class="lobby-controls">
                <select id="lobby-port-select" class="source-select" style="width: 100%; margin-bottom: 15px;">
                    <option value="">Select Port...</option>
                </select>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn btn-outline btn-sm" id="btn-lobby-refresh">⟳ Refresh</button>
                    <button class="btn btn-primary btn-sm" id="btn-lobby-connect">Connect</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="app">

    <!-- ═══ Top Bar ═══ -->
    <header id="titlebar">
        <div class="title">
            <div class="logo">DSP</div>
            <span>ESP32 DSP Control</span>
        </div>
        <div class="serial-controls">
            <div id="connection-status" class="disconnected">
                <span class="status-dot"></span>
                <span id="connection-label">Disconnected</span>
            </div>
            <select id="port-select" style="display:none">
                <option value="">Select Port...</option>
            </select>
            <button class="btn btn-outline btn-sm" id="btn-refresh" title="Refresh Port List" style="display:none">⟳</button>
            <button class="btn btn-primary btn-sm" id="btn-connect" style="display:none">Connect</button>
            <button class="btn btn-danger btn-sm" id="btn-disconnect" style="display:none">Disconnect</button>
        </div>
    </header>

    <!-- ═══ Main Content — Single column accordion list ═══ -->
    <div id="main-content">
        <div id="modules-list"></div>
    </div>

    <!-- ═══ Bottom Bar ═══ -->
    <footer id="bottom-bar">
        <div class="bottom-section">
            <span class="bottom-label">Master</span>
            <input type="range" id="master-vol" class="param-slider"
                   min="-9600" max="1800" step="25" value="0">
            <span id="master-vol-label" class="val-badge">0.0 dB</span>
        </div>
        <div class="bottom-section">
            <button class="btn btn-primary btn-sm" id="btn-save-preset" style="font-weight:800; padding: 4px 12px;">SAVE</button>
        </div>
        <div class="bottom-section">
            <span class="bottom-label">Presets</span>
            <div class="preset-group">
                <button class="preset-btn" id="preset-0">1</button>
                <button class="preset-btn" id="preset-1">2</button>
                <button class="preset-btn" id="preset-2">3</button>
                <button class="preset-btn" id="preset-3">4</button>
                <button class="preset-btn" id="preset-4">5</button>
                <button class="preset-btn" id="preset-5">6</button>
                <button class="preset-btn" id="preset-6">7</button>
                <button class="preset-btn" id="preset-7">8</button>
            </div>
        </div>
        <!-- <div class="bottom-section">
            <span class="bottom-label">Input</span>
            <select class="source-select" id="input-source">
                <option value="0">I2S</option>
                <option value="1">ADC</option>
            </select>
            <span class="bottom-label">Output</span>
            <select class="source-select" id="output-source">
                <option value="0">I2S (DAC)</option>
                <option value="1">Analog</option>
            </select>
        </div> -->
        <div class="bottom-section">
            <span id="status-text" class="status-off">Ready</span>
        </div>
    </footer>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
